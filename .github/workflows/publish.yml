name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for npm Trusted Publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # No `registry-url` — that flag writes an empty _authToken to .npmrc and
      # blocks npm's OIDC token-exchange. Trusted Publishing needs the CLI to
      # handle auth itself. Node 24 ships an npm new enough (>=11.5.1) for OIDC.
      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - run: bun install --frozen-lockfile

      - run: bun run check

      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "tag $tag does not match package.json version $pkg" >&2
            exit 1
          fi

      - run: npm publish --provenance --access public
